<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Splash Screen Preview</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        background: #1a1a2e;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        gap: 40px;
        padding: 40px 20px;
      }

      h1 {
        color: #fff;
        font-size: 14px;
        letter-spacing: 2px;
        text-transform: uppercase;
        opacity: 0.5;
      }

      .devices {
        display: flex;
        gap: 40px;
        flex-wrap: wrap;
        justify-content: center;
      }

      .device-wrap {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 12px;
      }

      .device-label {
        color: #fff;
        font-size: 11px;
        letter-spacing: 1px;
        text-transform: uppercase;
        opacity: 0.4;
      }

      /* Phone frame */
      .phone {
        width: 200px;
        height: 400px;
        border-radius: 32px;
        border: 6px solid #333;
        background: #000;
        position: relative;
        overflow: hidden;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5), inset 0 0 0 1px #555;
      }

      .phone::before {
        content: '';
        position: absolute;
        top: 10px;
        left: 50%;
        transform: translateX(-50%);
        width: 50px;
        height: 8px;
        background: #222;
        border-radius: 4px;
        z-index: 10;
      }

      /* The actual splash screen inside the phone */
      .splash {
        position: absolute;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 16px;
      }

      .splash img {
        width: 72px;
        height: 72px;
        border-radius: 16px;
      }

      .splash .app-name {
        font-size: 13px;
        font-weight: 600;
        letter-spacing: 0.5px;
      }

      /* Status bar stripe */
      .status-bar {
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 24px;
      }

      /* Controls panel */
      .controls {
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 16px;
        padding: 24px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        width: 100%;
        max-width: 480px;
      }

      .control-row {
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .control-row label {
        color: #fff;
        font-size: 12px;
        width: 140px;
        opacity: 0.7;
      }

      .control-row input[type='color'] {
        width: 36px;
        height: 28px;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        padding: 2px;
        background: transparent;
      }

      .control-row input[type='text'] {
        flex: 1;
        background: rgba(255, 255, 255, 0.08);
        border: 1px solid rgba(255, 255, 255, 0.15);
        border-radius: 6px;
        color: #fff;
        font-size: 12px;
        padding: 6px 10px;
      }

      .control-row code {
        font-size: 11px;
        color: #aaa;
        font-family: monospace;
        background: rgba(255, 255, 255, 0.05);
        padding: 2px 6px;
        border-radius: 4px;
      }

      .hint {
        color: rgba(255, 255, 255, 0.25);
        font-size: 10px;
        text-align: center;
        letter-spacing: 0.5px;
      }
    </style>
  </head>
  <body>
    <h1>Splash Screen Preview</h1>

    <div class="devices">
      <!-- Android-style (generated from manifest) -->
      <div class="device-wrap">
        <div class="phone">
          <div class="status-bar" id="statusBar"></div>
          <div class="splash" id="splashScreen">
            <img id="splashIcon" src="/public/img/logo.png" alt="icon" />
            <span class="app-name" id="splashName"></span>
          </div>
        </div>
        <span class="device-label">Android / Chrome</span>
      </div>

      <!-- iOS-style (uses apple-touch-icon, same image) -->
      <div class="device-wrap">
        <div class="phone" style="border-radius: 40px;">
          <div class="status-bar" id="statusBarIos"></div>
          <div class="splash" id="splashScreenIos">
            <img
              id="splashIconIos"
              src="/public/img/logo.png"
              alt="icon"
              style="border-radius: 22px; width: 80px; height: 80px;"
            />
          </div>
        </div>
        <span class="device-label">iOS / Safari</span>
      </div>
    </div>

    <!-- Controls -->
    <div class="controls">
      <div class="control-row">
        <label>Background color</label>
        <input type="color" id="bgColor" value="#FA4375" oninput="update()" />
        <input
          type="text"
          id="bgColorText"
          value="#FA4375"
          oninput="syncFromText('bgColor', 'bgColorText')"
        />
        <code>background_color</code>
      </div>
      <div class="control-row">
        <label>Theme color (status bar)</label>
        <input
          type="color"
          id="themeColor"
          value="#E53935"
          oninput="update()"
        />
        <input
          type="text"
          id="themeColorText"
          value="#E53935"
          oninput="syncFromText('themeColor', 'themeColorText')"
        />
        <code>theme_color</code>
      </div>
      <div class="control-row">
        <label>App name</label>
        <input
          type="text"
          id="appName"
          value="Pura Sangre Clases"
          oninput="update()"
        />
        <code>name</code>
      </div>
    </div>

    <p class="hint">
      Los cambios aquí son solo visuales — edita manifest.json para aplicarlos.
    </p>

    <script>
      function update() {
        const bg = document.getElementById('bgColor').value;
        const theme = document.getElementById('themeColor').value;
        const name = document.getElementById('appName').value;

        // Sync text inputs
        document.getElementById('bgColorText').value = bg;
        document.getElementById('themeColorText').value = theme;

        // Apply to Android splash
        document.getElementById('splashScreen').style.background = bg;
        document.getElementById('splashName').style.color = isDark(bg)
          ? '#fff'
          : '#333';
        document.getElementById('splashName').textContent = name;
        document.getElementById('statusBar').style.background = theme;

        // Apply to iOS splash
        document.getElementById('splashScreenIos').style.background = bg;
        document.getElementById('statusBarIos').style.background = theme;
      }

      function syncFromText(colorId, textId) {
        const val = document.getElementById(textId).value;
        if (/^#[0-9a-fA-F]{6}$/.test(val)) {
          document.getElementById(colorId).value = val;
          update();
        }
      }

      function isDark(hex) {
        const r = parseInt(hex.slice(1, 3), 16);
        const g = parseInt(hex.slice(3, 5), 16);
        const b = parseInt(hex.slice(5, 7), 16);
        return (r * 299 + g * 587 + b * 114) / 1000 < 128;
      }

      // Init
      update();
    </script>
  </body>
</html>
